id: core_2x2_pilot_budget_constrained_v2
status: redesigned_not_started_review_pending
prepared_at: "2026-04-28T15:13:51+08:00"
redesigned_at: "2026-04-29T11:20:00+08:00"
owner: coordinator

execution_start:
  recorded: false
  broad_acut_execution_started: false
  model_calls_allowed: false
  required_before_start:
    - coordinator records explicit execution start
    - required LLM environment variables are present
    - cost ledger exists and is writable
    - projected spend does not exceed hard cap
    - every ACUT model call or patch-generation attempt appends a cost ledger record

llm_access:
  allowed_environment_variables:
    api_key: BARCAROLLE_LLM_API_KEY
    base_url: BARCAROLLE_LLM_BASE_URL
  record_values: false
  redaction_required: true
  credential_values_must_not_be_persisted: true

budget:
  currency: USD
  soft_stop: 240
  hard_cap: 300
  behavior:
    missing_required_environment: block_before_acut_command
    missing_or_unwritable_ledger: block_before_acut_command
    projected_hard_cap_overflow: block_before_acut_command
    projected_soft_stop_reached: requires_coordinator_approval

ledger:
  path: experiments/core_narrative/results/cost_ledger.jsonl
  required_fields:
    - run_id
    - acut_id
    - task_id
    - split
    - attempt
    - event
    - input_tokens
    - output_tokens
    - estimated_cost_usd
    - cumulative_estimated_cost_usd

active_default_slice:
  design: "2x2_core"
  design_goal: "Clean ranking-reversal probe with model tier crossed against generic-vs-Click-specialist policy."
  acuts:
    - frontier-generic-swe
    - frontier-click-specialist
    - cheap-generic-swe
    - cheap-click-specialist
  deferred_acuts:
    - higher-budget-repo-depth
    - retrieval-history-augmented
    - minimal-context-baseline
  retired_or_replaced_acuts:
    general-benchmark-optimized: frontier-generic-swe
    repo-context-heavy: frontier-click-specialist
    retrieval-sparse-symbolic: frontier-click-specialist
    lower-budget-fast-path: cheap-generic-swe
  controls:
    same_harness: true
    same_task_budget: true
    same_turn_cap: true
    same_test_cap: true
    same_retry_policy: true
    same_model_tier_only_changes_policy_within_pairs: true
    no_gold_patches: true
    no_hidden_human_hints: true
    no_post_hoc_tuning: true
    no_undeclared_history_mining: true
  tasks:
    G_score: 6
    RBench: 8
    RWork: 6
  attempts:
    primary_per_acut_task: 1
    optional_extra_attempts_allowed: false
  total_primary_patch_generation_attempts: 80

pilot_slice:
  status: prepared_not_started
  default_before_full_core: true
  acuts:
    - frontier-generic-swe
    - frontier-click-specialist
    - cheap-generic-swe
    - cheap-click-specialist
  fallback_if_budget_tight:
    acuts:
      - frontier-generic-swe
      - frontier-click-specialist
      - cheap-click-specialist
    reason: "Preserve the frontier generic-vs-specialist contrast and include the cheap specialist cell most relevant to Barcarolle leverage."
  tasks:
    G_score:
      count: 2
      source: experiments/core_narrative/configs/general_benchmark.yaml
      ordinals: [1, 2]
    RBench:
      count: 3
      task_ids:
        - click__rbench__001
        - click__rbench__002
        - click__rbench__003
    RWork:
      count: 2
      task_ids:
        - click__rwork__001
        - click__rwork__002
  attempts:
    primary_per_acut_task: 1
    optional_extra_attempts_allowed: false
  total_primary_patch_generation_attempts: 28
  execution_policy:
    start_only_after_focused_review: true
    start_only_after_patch_command_contract_review: true
    broad_acut_execution_started: false
    model_calls_allowed: false
  promotion_to_full_core:
    allowed_only_after: "pilot summary review and explicit coordinator decision"
    full_core_attempts_if_promoted: 80

locked_inputs:
  target_repository:
    repository: pallets/click
    commit: 8bd8b4a074c55c03b6eb5666edc44a9c43df38a2
    local_checkout_cache: experiments/core_narrative/external_repos/click
    runtime: Python 3.12.12 via uv
  general_benchmark:
    dataset_id: ScaleAI/SWE-bench_Pro
    revision: 7ab5114912baf22bb098818e604c02fe7ad2c11f
    parquet_sha256: c8cd7115496ad4e9a8b21d088cef576a65bf821bb542b24336f13f714cef13f8
    locked_task_count: 6
    locked_task_ids_source: experiments/core_narrative/configs/general_benchmark.yaml

next_no_model_preflights:
  - focused review of the 2x2 ACUT redesign
  - focused review of the BARCAROLLE-env-only patch-generation command path
  - generate or verify task-agnostic Click specialist context artifacts before any specialist ACUT run
  - rerun execution-start preflight only after both focused reviews pass
  - do not start broad ACUT execution or model calls before the coordinator records a reviewed execution start
