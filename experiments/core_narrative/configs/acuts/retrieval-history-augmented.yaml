manifest_version: "0.1"
acut_id: "retrieval-history-augmented"
frozen: true
frozen_date: "2026-04-28"
operator:
  id: "codex-cli-worker-acut-matrix"
  branch: "codex/core-exp-acut-matrix"
  worktree: "/Users/chenmohan/gits/barcarolle-wt-acut-matrix"
purpose: "Retrieval variant that adds pre-cutoff repository history to test whether local development history improves repository-specific outcomes."
model:
  provider: "openai"
  name: "gpt-5.5"
  reasoning_effort: "high"
prompt_or_policy_digest:
  digest_id: "policy-digest-v1:retrieval-history-augmented"
  summary: "Use relevant pre-cutoff commit history, prior test changes, and file evolution to infer repository conventions before editing current code."
tool_permissions:
  filesystem:
    read:
      - "target_repository_checkout"
      - "public_task_statement"
      - "allowed_context_bundle"
    write:
      - "task_workspace"
    forbidden:
      - "private_reference_patch"
      - "private_expected_results"
      - "other_acut_outputs"
  shell:
    allowed: true
    destructive_commands: false
    package_install: false
  git:
    allowed:
      - "status"
      - "diff"
      - "show"
      - "log"
      - "blame"
    commit_allowed: false
  code_editing:
    allowed: true
  browser:
    allowed: false
retrieval_context_strategy:
  strategy_id: "precutoff-history-augmented"
  allowed_sources:
    - "public_task_statement"
    - "repository README and contributor docs"
    - "adjacent tests"
    - "callers and callees of touched symbols"
    - "pre-cutoff git log for touched files"
    - "pre-cutoff diffs related to touched files"
  disallowed_sources:
    - "private benchmark artifacts"
    - "reference patches"
    - "post-cutoff task anchors when runner marks them unavailable"
    - "other ACUT run outputs"
  initial_context_budget_tokens: 52000
  maximum_context_budget_tokens: 140000
  repository_map: "history_augmented"
  search_policy: "Inspect current symbols first, then read bounded pre-cutoff history for touched files and associated tests."
runtime_budget:
  wall_clock_minutes: 95
  model_turns: 30
  shell_commands: 100
  test_commands: 14
  verification_minutes: 28
network_policy:
  default: "denied"
  allowed_hosts: []
  package_downloads: false
execution_mode:
  type: "non_interactive_codex_cli"
  workspace: "fresh_task_worktree"
  state_reset_between_tasks: true
  private_artifacts_access: false
  output_contract: "patch_plus_run_metadata"
adapter_or_harness_basis:
  adapter_id: "codex-cli-acut-adapter-v0"
  harness_id: "core-narrative-runner-v0"
  basis: "Experiment plan section 5 runner/verifier scaffold; exact script paths may be finalized by schema-toolsmith."
  expected_inputs:
    - "base repository checkout"
    - "public task statement"
    - "allowed context bundle"
  expected_outputs:
    - "unified diff"
    - "run metadata"
score_fields:
  g_score: null
  r_score: null
  w_score: null
  public_benchmark_score: null
  general_benchmark_basis_id: "general_benchmark.yaml#pending"
