manifest_version: "0.1"
acut_id: "lower-budget-fast-path"
frozen: true
frozen_date: "2026-04-28"
operator:
  id: "codex-cli-worker-acut-matrix"
  branch: "codex/core-exp-acut-matrix"
  worktree: "/Users/chenmohan/gits/barcarolle-wt-acut-matrix"
purpose: "Lower-budget configuration for measuring whether speed-optimized agents collapse on repository-specific work."
model:
  provider: "openai"
  name: "gpt-5.4-mini"
  reasoning_effort: "low"
prompt_or_policy_digest:
  digest_id: "policy-digest-v1:lower-budget-fast-path"
  summary: "Use the shortest plausible path to a passing targeted test; avoid exploratory reads unless directly required by an error or named symbol."
tool_permissions:
  filesystem:
    read:
      - "target_repository_checkout"
      - "public_task_statement"
    write:
      - "task_workspace"
    forbidden:
      - "private_reference_patch"
      - "private_expected_results"
      - "other_acut_outputs"
  shell:
    allowed: true
    destructive_commands: false
    package_install: false
  git:
    allowed:
      - "status"
      - "diff"
      - "show"
    commit_allowed: false
  code_editing:
    allowed: true
  browser:
    allowed: false
retrieval_context_strategy:
  strategy_id: "fast-path-targeted"
  allowed_sources:
    - "public_task_statement"
    - "directly named files"
    - "direct test output"
  disallowed_sources:
    - "private benchmark artifacts"
    - "reference patches"
    - "broad repository map"
    - "git history scan"
  initial_context_budget_tokens: 8000
  maximum_context_budget_tokens: 24000
  repository_map: "none"
  search_policy: "Run or inspect the smallest target first; only search for exact strings or symbols needed for the candidate patch."
runtime_budget:
  wall_clock_minutes: 20
  model_turns: 8
  shell_commands: 18
  test_commands: 4
  verification_minutes: 6
network_policy:
  default: "denied"
  allowed_hosts: []
  package_downloads: false
execution_mode:
  type: "non_interactive_codex_cli"
  workspace: "fresh_task_worktree"
  state_reset_between_tasks: true
  private_artifacts_access: false
  output_contract: "patch_plus_run_metadata"
adapter_or_harness_basis:
  adapter_id: "codex-cli-acut-adapter-v0"
  harness_id: "core-narrative-runner-v0"
  basis: "Experiment plan section 5 runner/verifier scaffold; exact script paths may be finalized by schema-toolsmith."
  expected_inputs:
    - "base repository checkout"
    - "public task statement"
    - "allowed context bundle"
  expected_outputs:
    - "unified diff"
    - "run metadata"
score_fields:
  g_score: null
  r_score: null
  w_score: null
  public_benchmark_score: null
  general_benchmark_basis_id: "general_benchmark.yaml#pending"
