  wall_time_estimate: "gold smoke plus verification can take hours; ACUT patch generation dominates and must use the ACUT manifest budget caps"
  cost_driver: "6 * number_of_acuts long-horizon patch-generation attempts plus container verification"

limitations:
  - "The configured slice is the revised six-task default, not the official full SWE-Bench Pro public leaderboard."
  - "Concrete task IDs are locked from the pinned dataset, but pre-ACUT gold-patch smoke evaluation is still required before scored runs."
  - "Public tasks can still be contaminated in model training or discoverable through external search; ACUT network policy must match the repository experiment policy."
  - "SWE-Bench Pro is broader and harder than many target repositories, so G_score may underweight repository-specific context strategies."
  - "SWE-Bench Pro scoring is test-based; it does not directly measure maintainability, code review acceptability, or product fit."
  - "Public leaderboard scores use different scaffolds, budgets, and sometimes uncapped settings; they are not comparable to this direct-run slice."

